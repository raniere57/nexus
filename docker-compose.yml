version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/nexus.db
    volumes:
      - nexus_data:/data
    # Exposing the port is optional if we only access it through the frontend nginx proxy.
    # We will expose it just in case direct access to /docs swagger is needed locally.
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus_frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      - backend

volumes:
  nexus_data:
